<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <title>Monitoring PC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="top-bar">
        <h1>MONITORING FOR PERSONAL COMPUTER</h1>
        <button id="theme-toggle" onclick="toggleTheme()">☀️ Clair</button>
    </div>
    
    <div id="stats-bar">
        <div class="stat-badge online-badge">● <span id="count-online">0</span> ONLINE</div>
        <div class="stat-badge offline-badge">● <span id="count-offline">0</span> OFFLINE</div>
        <div class="stat-badge total-badge">📡 <span id="count-total">0</span> TOTAL</div>
    </div>
    
    <div id="devices-container">
        <!-- Les cartes des PC seront ajoutées ici via JS -->
    </div>
    <!-- Modal -->
    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
